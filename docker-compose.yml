    nginx:
        image: nginx:alpine
        container_name: nginx_api-angkringan
        restart: unless-stopped
        depends_on:
            - app

        ports:
            - "8197:80"
        volumes:
            - ./:/var/www
            - ./docker-compose/nginx:/etc/nginx/conf.d
        networks:
            - angkringannet
        healthcheck:
            test: ["CMD-SHELL", "curl -f http://localhost || exit 1"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 30s

    redis:
        image: redis:7
        container_name: redis-server-api-angkringan
        restart: unless-stopped
        volumes:
            - redis_data:/data
        ports:
            - "26752:6379"
        networks:
            - angkringannet

    scheduler:
        image: api-angkringan-app # Pakai image dari app
        container_name: api-angkringan-scheduler
        command: ["php", "artisan", "schedule:work"]
        depends_on:
            - app
            - redis
            # - db
        volumes:
            - ./:/var/www
        env_file:
            - .env
        networks:
            - angkringannet

volumes:
    # mysql_data:
    redis_data:

networks:
    angkringannet:
        driver: bridge
