services:
    app:
        image: api-angkringan-app
        build:
            args:
                user: angkringan
                uid: 1001
            context: ./
            dockerfile: Dockerfile.dev
        container_name: api-angkringan-app
        working_dir: /var/www/
        restart: unless-stopped
        # ports:
        #     - "8002:8000" # Menghindari konflik port dengan Nginx
        environment:
            - COMPOSER_MEMORY_LIMIT=-1
        volumes:
            - ./:/var/www
        networks:
            - angkringannet
        depends_on:
            # - db
            - redis

    # db:
    #     image: mysql/mysql-server:5.7
